name: goreleaser (self-hosted test)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist, e.g. v0.1.27)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: false
      - name: Import GPG Key
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -m 700 -p "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --no-tty --batch
          gpg --list-secret-keys
          fingerprint=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')
          echo "GPG_FINGERPRINT=$fingerprint" >> "$GITHUB_ENV"
      - name: install quill
        run: |
          curl -sSfL https://get.anchore.io/quill | sh -s -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: verify quill
        run: quill version
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --timeout 120m --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GH_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          QUILL_NOTARY_KEY: ${{ secrets.QUILL_NOTARY_KEY }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.QUILL_NOTARY_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.QUILL_NOTARY_ISSUER }}
