firecracker:
  # Path to the uncompressed Linux kernel image (vmlinux) used to boot microVMs.
  kernelImage: ~/.onctl/firecracker/images/vmlinux
  # Path to the base rootfs image (ext4). Copied per-VM, never modified in place.
  rootfsImage: ~/.onctl/firecracker/images/rootfs.ext4
  # Extra kernel boot arguments. Network configuration (ip=...) is appended automatically.
  # kernelArgs: "console=ttyS0 reboot=k panic=1 pci=off"
  vcpuCount: 1
  memSizeMib: 512
  # Path to the firecracker binary.
  binPath: firecracker
  network:
    # Host bridge that microVM TAP devices attach to.
    bridge: fcbr0
    # Bridge address and subnet. The bridge address is used as the microVM gateway.
    cidr: 172.16.0.1/24
  vm:
    # SSH user configured in the rootfs image.
    username: root
